<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AK Picture | Design Agency</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @font-face {
            font-family: 'Negan DEMO';
            src: url('Negan-DEMO-Regular.otf') format('opentype');
        }

        :root {
            --bg-black: #000000;
            --primary-white: #FFFFFF;
            --secondary-yellow: #FFD700; 
            --accent-cyan: #00ffff;
            --transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body { 
            background: var(--bg-black); color: var(--primary-white); 
            font-family: 'Inter', sans-serif;
            overflow-x: hidden; overflow-y: auto; 
        }
        body::-webkit-scrollbar { display: none; }
		
        /* --- VIDEO BACKGROUND --- */
        #video-bg-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }
        #video-bg-container video { width: 100%; height: 100%; object-fit: cover; opacity: 0.45; }
        #video-bg-container::after {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 10%, rgba(0,0,0,0.8) 100%);
        }

        /* --- 3S CINEMATIC INTRO (Optimized) --- */
        #intro-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-black); z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 1.5s, visibility 1.5s;
        }
        .intro-logo { 
            font-family: 'Negan DEMO', sans-serif; font-size: clamp(3rem, 10vw, 6rem); 
            color: var(--secondary-yellow); text-align: center;
            animation: cinematicReveal 3s forwards, glowPulse 4s infinite alternate;
        }
        .intro-tagline { letter-spacing: 12px; text-transform: uppercase; font-size: 0.9rem; margin-top: 20px; opacity: 0; animation: fadeIn 2s forwards 1s; }

        /* --- NAVIGATION --- */
        nav { 
            position: fixed; top: 0; width: 100%; padding: 30px 6%; 
            display: flex; justify-content: space-between; align-items: center; 
            z-index: 1000; opacity: 0; transition: 1s; 
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
        }
        .logo { font-size: 2rem; font-family: 'Negan DEMO', sans-serif; color: var(--secondary-yellow); text-decoration: none; }
        .nav-links a { color: var(--primary-white); text-decoration: none; margin-left: 25px; font-weight: 700; text-transform: uppercase; font-size: 0.8rem; cursor: pointer; }

        /* --- SECTION 1: HERO LANDING PAGE --- */
        #hero-section {
            height: 100vh; width: 100%; display: flex; flex-direction: column;
            align-items: center; justify-content: center; position: relative;
            opacity: 0; transition: 1.5s 0.5s;
        }
        .hero-logo { font-family: 'Negan DEMO'; font-size: clamp(4rem, 18vw, 10rem); color: var(--secondary-yellow); line-height: 0.8; text-shadow: 0 0 20px rgba(255,215,0,0.3); }
        .hero-tag { letter-spacing: 15px; text-transform: uppercase; font-size: clamp(0.8rem, 2vw, 1.2rem); margin: 20px 0 40px; opacity: 0.8; }
        
        .scroll-down-icon {
            position: absolute; bottom: 120px; color: var(--secondary-yellow); font-size: 2rem;
            animation: bounce 2s infinite; text-decoration: none; opacity: 0.7; transition: 0.3s;
        }
        .scroll-down-icon:hover { opacity: 1; }

        /* --- STEP 1: HORIZONTAL GALLERY --- */
        #gallery-section { padding: 100px 0; opacity: 0; transition: 1.5s 0.8s; }
        .gallery-title { text-align: center; letter-spacing: 5px; text-transform: uppercase; margin-bottom: 40px; font-size: 1.5rem; }
        
        .scroll-container { 
            display: flex; gap: 20px; padding: 0 6%; overflow-x: auto; 
            scrollbar-width: none; cursor: grab;
        }
        .scroll-container::-webkit-scrollbar { display: none; }

        .folder-card { 
            flex: 0 0 300px; height: 400px; 
            background: #0a0a0a; border: 1px solid #222;
            border-radius: 15px; position: relative; overflow: hidden;
            display: flex; flex-direction: column; justify-content: flex-end;
            padding: 20px; transition: 0.4s ease;
        }
        .folder-card:hover { border-color: var(--accent-cyan); transform: translateY(-10px); }
        .folder-card img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.4; z-index: 1; }
        .folder-card h3 { position: relative; z-index: 2; color: #fff; text-transform: uppercase; font-size: 1rem; text-align: center; }

        /* --- STEP 2: VERTICAL SUB MENU PANEL --- */
        .panel {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.98); z-index: 5000; visibility: hidden; opacity: 0; 
            transition: 0.5s ease-in-out; padding: 80px 6%; overflow-y: auto;
        }
        .panel.active { visibility: visible; opacity: 1; }
        .sub-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 25px; margin-top: 40px; 
        }
        .sub-card { background: #111; border-radius: 15px; padding: 15px; text-align: center; border: 1px solid #222; }
        .sub-card img, .sub-card video { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 10px; margin-bottom: 15px; cursor: zoom-in; }
        .sub-card button { background: var(--secondary-yellow); color: #000; border: none; width: 100%; padding: 12px; font-weight: 800; border-radius: 8px; cursor: pointer; }

        /* --- BOOKING SECTION --- */
        #booking-section { padding: 100px 6%; background: #000; text-align: center; opacity: 0; transition: 1.5s;}
        .booking-form { max-width: 600px; margin: 0 auto; display: flex; flex-direction: column; gap: 15px; }
        .booking-form input, .booking-form select, .booking-form textarea {
            padding: 15px; background: #0a0a0a; border: 1px solid #222; color: #fff; border-radius: 5px;
        }
        .booking-form button {
            padding: 15px; background: none; border: 1px solid var(--accent-cyan); color: var(--accent-cyan); font-weight: 700; cursor: pointer; text-transform: uppercase;
        }

        /* --- FOOTER --- */
        footer {
            position: fixed; bottom: 0; width: 100%; height: 60px;
            background: var(--secondary-yellow); display: flex; align-items: center;
            justify-content: center; z-index: 1000; opacity: 0; transition: 1s;
        }
        .footer-fixed { display: flex; align-items: center; gap: 40px; color: #000; font-weight: 900; }
        
         /* KEYFRAMES */
        @keyframes cinematicReveal { 0% { opacity: 0; filter: blur(20px); transform: scale(0.9); } 100% { opacity: 1; filter: blur(0px); transform: scale(1); } }
        @keyframes fadeIn { to { opacity: 1; } }
        @keyframes glowPulse { from { text-shadow: 0 0 5px rgba(255,215,0,0); } to { text-shadow: 0 0 20px rgba(255,215,0,0.6); } }
        @keyframes ticker { from { transform: translateX(0); } to { transform: translateX(-50%); } }
        @keyframes bounce { 0%, 20%, 50%, 80%, 100% { transform: translateY(0); } 40% { transform: translateY(-20px); } 60% { transform: translateY(-10px); } }

        /* LOADED STATE */
        body.loaded #intro-layer { opacity: 0; visibility: hidden; pointer-events: none; }
        body.loaded nav, body.loaded #hero-section, body.loaded #gallery-section, body.loaded footer { opacity: 1; }

        @media (max-width: 600px) {
            nav { padding: 20px 6%; }
            .nav-links a { margin-left: 15px; font-size: 0.7rem; }
            footer { height: auto; flex-direction: column; padding: 10px; }
            .footer-fixed { padding-left: 0; padding-top: 5px; }
            .scroll-down-icon { bottom: 150px; }
        }
		/* STATE STYLES */
        body.loaded nav, body.loaded #hero-section, body.loaded #gallery-section, body.loaded #booking-section, body.loaded footer { opacity: 1; }
        .close-btn { position: fixed; top: 20px; right: 20px; font-size: 3rem; color: var(--secondary-yellow); cursor: pointer; z-index: 6000; }
        #fullView { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 10000; display: none; align-items: center; justify-content: center; }
    </style>
</head>
<body id="body-main">
	<div id="video-bg-container">
        <video autoplay muted loop playsinline><source src="akbg.mp4" type="video/mp4"></video>
    </div>

    <div id="intro-layer">
        <div class="intro-logo">AK Picture</div>
        <div class="intro-tagline">Design Agency</div>
    </div>

    <nav>
        <a href="#" class="logo">AK</a>
        <div class="nav-links">
            <a href="https://wa.me/916374506309" target="_blank">Contact</a>
            <a href="#gallery-section">Gallery</a>
        </div>
    </nav>
    <nav>
        <a href="#" class="logo">AK</a>
        <div class="nav-links">
            <a href="#booking-section">Contact</a>
            <a href="#gallery-section">Gallery</a>
        </div>
    </nav>

    <section id="hero-section">
        <h1 class="hero-logo">AK</h1>
        <p style="letter-spacing: 10px; text-transform: uppercase;">Design Agency</p>
    </section>

    <section id="gallery-section">
        <h2 class="gallery-title" onclick="openPanel('subGallery')" >Explore Portfolios</h2>
        <div class="scroll-container" id="mainTrack"></div>
    </section>

    <div id="subGallery" class="panel">
        <span class="close-btn" onclick="closeSub()">&times;</span>
        <h2 id="subHeader" style="color: var(--secondary-yellow); text-transform: uppercase; text-align:center; font-size: 2rem;">Category</h2>
        <div class="sub-grid" id="verticalGrid"></div>
    </div>

    <section id="booking-section">
        <h2 style="margin-bottom: 30px; text-transform: uppercase; letter-spacing: 3px;">Book Our Services</h2>
        <form class="booking-form">
            <input type="text" id="custName" placeholder="Your Name" required>
            <input type="text" id="custPhone" placeholder="Phone Number" required>
            <select id="custService" required>
                <option value="" disabled selected>Select a Service</option>
                <option value="Album Design">Album Design</option>
                <option value="Cinematic Videos">Branding</option>
                <option value="Invitation Cards">Invitation Card</option>
		<option value="Packaging Product Design">Album Design</option>
                <option value="Posters">Branding</option>
                <option value="Illustration">Invitation Card</option>
		<option value="Web design">Album Design</option>
                <option value="Branding">Branding</option>
                <option value="Calender Design & Print">Invitation Card</option>
            </select>
            <textarea id="custProject" placeholder="Your requirements..." rows="4"></textarea>
            <button type="button" onclick="sendToWhatsApp()">Send Enquiry</button>
        </form>
    </section>

    <div id="fullView" onclick="closeFullView()">
        <div id="fullContent" style="max-width:90%; max-height:80%;"></div>
    </div>

    <footer>
        <div class="footer-fixed">
            <div style="display:flex; gap:20px;">
                <a href="https://wa.me/916374506309" target="_blank" style="color:#000;"><i class="fab fa-whatsapp"></i></a>
                <i class="fab fa-facebook-f"></i>
                <i class="fa-brands fa-x-twitter"></i>
            </div>
            <div>6374506309</div>
        </div>
    </footer>

    <script>

        const categories = [
            { name: "Album Design", cover: "Album (1).jpg", images: ["Album (1).jpg", "Album (2).jpg", "Album (3).jpg", "Video Album.mp4"] },
            { name: "Cinematic Videos", cover: "akbg.mp4", images: ["akbg.mp4"] },
            { name: "Invitation Cards", cover: "images/poster-cover.jpg", images: ["images/p1.jpg", "images/p2.jpg"] },
            { name: "Packaging Product Design", cover: "Packging (10).jpg", images: ["Packging (10).jpg","Packging (11).jpg","Packging (12).jpg","Packging (13).jpg","Packging (14).jpg","Packging (15).jpg","Packging (16).jpg","Packging (17).jpg","Packging (20).jpg","mockup viboothi copy.jpg"] },
	    	{ name: "Posters", cover: "images/album-cover.jpg", images: ["images/album1.jpg"] },
	    	{ name: "Illustration", cover: "Album (1).jpg", images: ["Album (1).jpg", "Album (2).jpg", "Album (3).jpg", "akbg.mp4"] },
            { name: "Web design", cover: "logo (1).jpg", images: ["logo (1).jpg", "logo (2).jpg"] },
            { name: "Branding", cover: "logo (1).jpg", images: ["logo (1).jpg", "logo (2).jpg","logo (3).jpg", "logo (4).jpg","logo (5).jpg"]  },
            { name: "Calender Design & Print", cover: "images/album-cover.jpg", images: ["images/album1.jpg"] }
        ];
        
        // Intro Timer (Shortened to 3.5 seconds)
        setTimeout(() => { document.body.classList.add('loaded'); }, 3500);
		
	// Build Main Gallery
const track = document.getElementById('mainTrack');
categories.forEach((cat, index) => {
    const card = document.createElement('div');
    card.className = 'folder-card';
    card.innerHTML = `<img src="${cat.cover}"><h3>${cat.name}</h3>`;
    
    // Use 'click' instead of 'onclick'
    card.addEventListener('click', () => { 
        if (!isDragging) {
            openSub(index); 
        }
    }); 
    track.appendChild(card);            
});

        // DRAG LOGIC
        let isDown = false, startX, scrollLeft, isDragging = false;
        track.addEventListener('mousedown', () => { isDragging = false; });
        track.addEventListener('mousemove', () => { isDragging = true; });
        track.addEventListener('mousedown', (e) => { isDown = true; isDragging = false; startX = e.pageX - track.offsetLeft; scrollLeft = track.scrollLeft; });
        track.addEventListener('mouseup', () => { isDown = false; });
        track.addEventListener('mousemove', (e) => {
            if (!isDown) return;
            e.preventDefault();
            const x = e.pageX - track.offsetLeft;
            const walk = (x - startX) * 2;
            if(Math.abs(walk) > 5) isDragging = true;
            track.scrollLeft = scrollLeft - walk;
        });

        function openSub(index) {
    // Check if the element exists before trying to mute it
    const bgVid = document.querySelector('#video-bg-container video');
    if (bgVid) bgVid.muted = true;

    const cat = categories[index];
    // ... rest of your code
            document.getElementById('subHeader').innerText = cat.name;
            const grid = document.getElementById('verticalGrid');
            grid.innerHTML = '';

            cat.images.forEach((file, i) => {
                let mediaHtml = file.toLowerCase().endsWith('.mp4') 
                    ? `<video src="${file}" autoplay muted loop playsinline onclick="viewMedia('${file}', 'video', event)"></video>`
                    : `<img src="${file}" onclick="viewMedia('${file}', 'img', event)">`;
                
                grid.innerHTML += `<div class="sub-card">${mediaHtml}<p style="font-size:0.7rem; color:#888; margin-bottom:10px;">0${i+1}</p><button onclick="window.open('https://wa.me/916374506309?text=Enquiry%20for%20${cat.name}', '_blank')">ENQUIRY</button></div>`;
            });
            document.getElementById('subGallery').classList.add('active');
            document.body.style.overflow = 'hidden'; 
        }

        function closeSub() { 
            document.getElementById('subGallery').classList.remove('active'); 
            document.body.style.overflow = 'auto'; 
            const vids = document.querySelectorAll('#verticalGrid video');
            vids.forEach(v => { v.pause(); v.muted = true; });
            closeFullView();
        }

        function viewMedia(file, type, event) {
            event.stopPropagation();
            const view = document.getElementById('fullView');
            const content = document.getElementById('fullContent');
            content.innerHTML = type === 'video' 
                ? `<video id="activeFullVid" src="${file}" controls autoplay style="width:100%; max-height:80vh;"></video>`
                : `<img src="${file}" style="width:100%; max-height:80vh; object-fit:contain;">`;
            view.style.display = 'flex';
        }

        function closeFullView() {
            const fv = document.getElementById('activeFullVid');
            if (fv) { fv.pause(); fv.src = ""; }
            document.getElementById('fullContent').innerHTML = "";
            document.getElementById('fullView').style.display = 'none';
        }

        function sendToWhatsApp() {
            const name = document.getElementById('custName').value;
            const phone = document.getElementById('custPhone').value;
            const service = document.getElementById('custService').value;
            const project = document.getElementById('custProject').value;
            if (!name || !phone || !service) { alert("Fill all fields"); return; }
            const msg = `*ENQUIRY*%0A*Name:* ${name}%0A*Phone:* ${phone}%0A*Service:* ${service}%0A*Project:* ${project}`;
            window.open(`https://wa.me/916374506309?text=${msg}`, '_blank');
        }
    </script>
</body>
</html>
